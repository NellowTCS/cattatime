name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build-command: npm run build:linux
            artifact-path: frontend/out/artifacts
          - os: macos-latest
            build-command: npm run build:mac
            artifact-path: frontend/out/artifacts
          - os: windows-latest
            build-command: npm run build:win
            artifact-path: frontend/out/artifacts

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache frontend dependencies
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: node-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            node-frontend-

      - name: Build ${{ matrix.os }}
        working-directory: frontend
        run: ${{ matrix.build-command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: catatime-${{ matrix.os }}-${{ github.ref_name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: ignore

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
